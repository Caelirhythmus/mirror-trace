<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirror Trace — 路径临摹</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <h1>Mirror Trace</h1>
    <div id="canvas-container">
      <div class="canvas-wrapper">
        <h2>参考线条</h2>
        <canvas id="ref-canvas"></canvas>
      </div>
      <div class="canvas-wrapper">
        <h2>你的临摹</h2>
        <canvas id="user-canvas"></canvas>
      </div>
    </div>

    <div id="score-panel">
      <div class="score-primary">
        <span class="score-label">总分</span>
        <span class="score-value" id="score-final">—</span>
      </div>
      <div class="score-detail">
        <span>空间 <strong id="score-spatial">—</strong></span>
        <span>时间 <strong id="score-time">—</strong></span>
      </div>
      <div class="coverage-info">
        <span>覆盖进度</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span id="coverage-pct">0%</span>
      </div>
      <div class="score-debug">
        Hausdorff95: <span id="debug-hausdorff">—</span> px &nbsp;|&nbsp;
        RMS: <span id="debug-rms">—</span> px &nbsp;|&nbsp;
        用时 <span id="debug-elapsed">—</span> / <span id="debug-ideal">—</span> ms
      </div>
      <label class="toggle-label" title="根据笔压调整线条粗细，倾斜角调整透明度">
        <input type="checkbox" id="toggle-pressure" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-text">笔锋</span>
      </label>
      <label class="toggle-label" title="在右侧画布显示参考线淡影，笔附近高亮">
        <input type="checkbox" id="toggle-heatmap" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-text">引导</span>
      </label>
      <span class="mode-indicator" id="mode-label">概括</span>
      <label class="toggle-label" title="切换概括/单笔模式">
        <input type="checkbox" id="toggle-mode" />
        <span class="toggle-slider"></span>
        <span class="toggle-text">单笔</span>
      </label>
      <div class="history-buttons">
        <button id="btn-redraw" title="重画 R">↺</button>
        <button id="btn-newcurve" title="再画一张 N">✚</button>
        <button id="btn-undo" disabled title="撤销 Ctrl+Z">↩</button>
        <button id="btn-redo" disabled title="重做 Ctrl+Y">↪</button>
      </div>
    </div>

    <div id="multi-config">
      <div class="config-row">
        <label class="toggle-label" title="单条/多条">
          <input type="checkbox" id="toggle-multi" />
          <span class="toggle-slider"></span>
          <span class="toggle-text">多条</span>
        </label>
      </div>
      <div class="config-row" id="multi-params">
        <label>直线 <input type="number" id="input-straight" value="2" min="0" max="20" /></label>
        <label>总量 <input type="number" id="input-total" value="5" min="1" max="20" /></label>
      </div>
    </div>

    <div id="history-panel">
      <div id="history-header">
        <span id="history-label">历史记录</span>
        <button id="btn-clear-history" title="清空所有记录">清空</button>
      </div>
      <canvas id="history-chart"></canvas>
      <div id="history-list"></div>
    </div>

    <div id="full-eval-status"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
