<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirror Trace — 路径临摹</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <h1>
      <span id="top-left-group">
        <button id="btn-sidebar" title="侧栏 B/Ctrl+H">菜单</button>
        <span id="theme-selector">
          <button class="theme-dot" data-theme="dark-blue" title="深蓝"></button>
          <button class="theme-dot" data-theme="light" title="浅色"></button>
          <button class="theme-dot" data-theme="dark-green" title="墨绿"></button>
          <button class="theme-dot" data-theme="dark-purple" title="暮紫"></button>
          <button class="theme-dot" data-theme="gray" title="现代"></button>
        </span>
      </span>
      Mirror Trace
    </h1>
    <div id="canvas-container">
      <div class="canvas-wrapper">
        <h2>参考线条</h2>
        <canvas id="ref-canvas"></canvas>
      </div>
      <div class="canvas-wrapper">
        <h2>你的临摹</h2>
        <canvas id="user-canvas"></canvas>
      </div>
    </div>

    <div id="score-panel">
      <div class="score-primary">
        <span class="score-label">总分</span>
        <span class="score-value" id="score-final">—</span>
      </div>
      <div class="score-detail">
        <span>空间 <strong id="score-spatial">—</strong></span>
        <span>时间 <strong id="score-time">—</strong></span>
      </div>
      <div class="coverage-info">
        <span>覆盖进度</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span id="coverage-pct">0%</span>
      </div>
      <div class="score-debug">
        Hausdorff95: <span id="debug-hausdorff">—</span> px &nbsp;|&nbsp;
        RMS: <span id="debug-rms">—</span> px &nbsp;|&nbsp;
        用时 <span id="debug-elapsed">—</span> / <span id="debug-ideal">—</span> ms
      </div>
      <div id="eval-badges" class="eval-badges" style="display:none"></div>
    </div>

    <div id="multi-config">
      <div class="config-row" id="multi-toggle-row">
        <label class="toggle-label" title="单条/多条">
          <input type="checkbox" id="toggle-multi" />
          <span class="toggle-slider"></span>
          <span class="toggle-text">多条</span>
        </label>
      </div>
      <div class="config-row" id="hell-toggle-row" style="display:none">
        <label class="toggle-label" title="地狱模式：直线+弧线+复杂曲线自由配">
          <input type="checkbox" id="toggle-hell" />
          <span class="toggle-slider"></span>
          <span class="toggle-text">地狱</span>
        </label>
      </div>
      <div class="config-row" id="multi-params">
        <label>直线 <input type="number" id="input-straight" value="2" min="0" max="20" /></label>
        <label>弧线 <input type="number" id="input-arch" value="3" min="0" max="20" /></label>
      </div>
      <div class="config-row" id="hell-params" style="display:none">
        <label>直线 <input type="number" id="input-hell-straight" value="2" min="0" max="20" /></label>
        <label>弧线 <input type="number" id="input-hell-arch" value="2" min="0" max="20" /></label>
        <label>复杂 <input type="number" id="input-hell-complex" value="1" min="0" max="20" /></label>
      </div>
      <div class="config-row" id="complex-params" style="display:none">
        <label>复杂分段 <input type="number" id="input-segments" value="3" min="2" max="12" /></label>
      </div>
      <div class="config-row" id="preset-row">
        <label>预设
          <select id="preset-select">
            <option value="">—</option>
            <option value="hell-4-3-2">地狱 4-3-2</option>
            <option value="hell-2-2-2">地狱 2-2-2</option>
            <option value="hell-1-1-2">地狱 1-1-2</option>
            <option value="hell-0-0-2">地狱 0-0-2</option>
            <option value="multi-3+2">多线 3+2</option>
            <option value="multi-1+1">多线 1+1</option>
            <option value="quick-2">多线 0+2</option>
          </select>
        </label>
      </div>
      <div class="ctrl-group">
        <label class="toggle-label" title="根据笔压调整线条粗细，倾斜角调整透明度">
          <input type="checkbox" id="toggle-pressure" checked />
          <span class="toggle-slider"></span>
          <span class="toggle-text">笔锋</span>
        </label>
        <label class="toggle-label" title="在右侧画布显示参考线淡影，笔附近高亮">
          <input type="checkbox" id="toggle-heatmap" checked />
          <span class="toggle-slider"></span>
          <span class="toggle-text">引导</span>
        </label>
        <label class="toggle-label" title="在画布上显示辅助网格">
          <input type="checkbox" id="toggle-grid" />
          <span class="toggle-slider"></span>
          <span class="toggle-text">网格</span>
        </label>
        <label class="toggle-label" title="线条使用不同颜色区分（关闭时统一为白色）">
          <input type="checkbox" id="toggle-color" />
          <span class="toggle-slider"></span>
          <span class="toggle-text">着色</span>
        </label>
        <input type="number" id="input-grid-size" value="40" min="20" max="100" step="10"
          style="display:none;width:48px;font-size:0.75rem;padding:1px 3px;background:#1a1a3a;border:1px solid #333;border-radius:3px;color:#a0a0c0;" />
        <span id="mode-switch">
          <span class="mode-indicator" id="mode-label">概括</span>
          <label class="toggle-label" title="切换概括/单笔模式">
            <input type="checkbox" id="toggle-mode" />
            <span class="toggle-slider"></span>
            <span class="toggle-text">单笔</span>
          </label>
        </span>
        <div class="history-buttons">
          <button id="btn-redraw" title="重画 R">↺</button>
          <button id="btn-newcurve" title="再画一张 N">✚</button>
          <button id="btn-replay" disabled title="回放上个笔画 ▶">▶</button>
          <button id="btn-undo" disabled title="撤销 Ctrl+Z">↩</button>
          <button id="btn-redo" disabled title="重做 Ctrl+Y">↪</button>
          <button id="btn-export" title="导出">↓</button>
          <button id="btn-help" title="快捷键 ?">?</button>
        </div>
      </div>
    </div>

    <!-- Export popup menu -->
    <div id="export-menu" style="display:none">
      <button data-export="svg">SVG</button>
      <button data-export="png">PNG</button>
      <button data-export="report">报告</button>
    </div>

    <!-- Keyboard shortcut help overlay -->
    <div id="help-overlay" style="display:none">
      <div id="help-box">
        <h3>快捷键</h3>
        <table>
          <tr><td class="key">N</td><td>新曲线</td></tr>
          <tr><td class="key">R</td><td>重画</td></tr>
          <tr><td class="key">S</td><td>SVG 导出</td></tr>
          <tr><td class="key">Ctrl+Z</td><td>撤销</td></tr>
          <tr><td class="key">Ctrl+Y</td><td>重做</td></tr>
          <tr><td class="key">1</td><td>概括模式</td></tr>
          <tr><td class="key">2</td><td>单笔模式</td></tr>
          <tr><td class="key">3</td><td>多条模式</td></tr>
          <tr><td class="key">4</td><td>地狱模式</td></tr>
          <tr><td class="key">G</td><td>网格开关</td></tr>
          <tr><td class="key">C</td><td>着色开关</td></tr>
          <tr><td class="key">H</td><td>引导开关</td></tr>
          <tr><td class="key">B</td><td>侧栏开关</td></tr>
          <tr><td class="key">Ctrl+H</td><td>侧栏开关</td></tr>
          <tr><td class="key">P</td><td>笔锋开关</td></tr>
          <tr><td class="key">?</td><td>关闭此面板</td></tr>
        </table>
      </div>
    </div>

    <!-- Backdrop: clicking it closes the sidebar -->
    <div id="sidebar-backdrop" class="sidebar-closed"></div>

    <!-- Toggleable sidebar: nav placeholders + history -->
    <div id="sidebar" class="sidebar-closed">
      <div id="sidebar-nav">
        <button class="sidebar-nav-btn" disabled title="首页（待开发）">🏠</button>
        <button class="sidebar-nav-btn" disabled title="统计（待开发）">📊</button>
        <button class="sidebar-nav-btn" disabled title="设置（待开发）">⚙️</button>
      </div>
      <div class="sidebar-divider"></div>
      <div id="sidebar-history">
        <div id="sidebar-history-header">
          <span id="sidebar-history-label">历史记录</span>
          <button id="btn-close-sidebar" title="关闭侧栏">✕</button>
          <button id="btn-clear-history" title="清空所有记录">清空</button>
        </div>
        <canvas id="history-chart"></canvas>
        <div id="history-list"></div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
